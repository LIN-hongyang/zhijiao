<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萤火支教 - 点亮希望·筑梦前行</title>

    <!-- CloudBase SDK -->
    <script src="https://web-9gikcbug35bad3a8-1304825656.tcloudbaseapp.com/sdk/1.6.0/cloud.js"></script>

    <style>
        :root {
            --primary: #F4845F;
            --primary-dark: #E0693F;
            --primary-light: #FFF0EA;
            --secondary: #3D5A80;
            --accent: #EEB868;
            --success: #5CB85C;
            --info: #5BC0DE;
            --warning: #F0AD4E;
            --danger: #D9534F;
            --bg: #FFFDF9;
            --bg-gray: #F8F6F1;
            --text: #3D3D3D;
            --text-light: #6B6B6B;
            --text-lighter: #999;
            --white: #FFFFFF;
            --border: #E8E3DA;
            --shadow-sm: 0 2px 8px rgba(61,45,30,0.06);
            --shadow: 0 4px 20px rgba(61,45,30,0.10);
            --shadow-lg: 0 8px 40px rgba(61,45,30,0.14);
            --radius: 14px;
            --radius-sm: 8px;
            --radius-lg: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            --max-width: 1200px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; font-size:16px; }
        body {
            font-family: var(--font-family);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .navbar {
            position: fixed; top:0; left:0; right:0; z-index:1000;
            background: rgba(255,253,249,0.88);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); transition: var(--transition); padding: 0 20px;
        }
        .navbar.scrolled { box-shadow: var(--shadow-sm); background: rgba(255,253,249,0.96); }
        .navbar-inner {
            max-width: var(--max-width); margin:0 auto;
            display: flex; align-items: center; justify-content: space-between; height:66px;
        }
        .nav-logo {
            display: flex; align-items: center; gap:10px; text-decoration: none;
            font-size:1.4rem; font-weight:700; color:var(--primary); letter-spacing:1px; transition: var(--transition);
        }
        .nav-logo .logo-icon {
            width:40px; height:40px; background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size:1.4rem; color:#fff; box-shadow: 0 4px 14px rgba(244,132,95,0.35);
        }
        .nav-links { display: flex; list-style: none; gap:6px; align-items: center; }
        .nav-links a {
            text-decoration: none; color:var(--text); padding:10px 18px; border-radius:50px;
            font-weight:500; font-size:0.95rem; transition: var(--transition); letter-spacing:0.5px;
        }
        .nav-links a:hover, .nav-links a.active { color:var(--primary); background: var(--primary-light); }
        .nav-links a.btn-nav {
            background: var(--primary); color:#fff; padding:10px 22px; font-weight:600;
            box-shadow: 0 4px 14px rgba(244,132,95,0.35); transition: var(--transition);
        }
        .nav-links a.btn-nav:hover {
            background: var(--primary-dark); transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244,132,95,0.45); color:#fff;
        }
        .hero {
            min-height:100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(170deg, #FFFDF9 0%, #FFF5EF 30%, #FFEDE2 60%, #FFFDF9 100%);
            position: relative; overflow: hidden; padding:100px 20px 60px;
        }
        .hero-content {
            position: relative; z-index:2; max-width:var(--max-width); width:100%;
            display: flex; align-items: center; gap:50px; flex-wrap: wrap;
        }
        .hero-text { flex:1 1 420px; text-align:center; }
        .hero-text h1 {
            font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight:800; line-height:1.25;
            color:#2A1F18; margin-bottom:16px;
        }
        .hero-text h1 span { color:var(--primary); }
        .hero-text p {
            font-size:1.15rem; color:var(--text-light); margin-bottom:30px; max-width:480px; margin-left:auto; margin-right:auto;
        }
        .hero-buttons { display: flex; gap:14px; flex-wrap: wrap; justify-content:center; }
        .btn {
            display: inline-flex; align-items: center; gap:8px; padding:13px 28px;
            border-radius:50px; font-weight:600; font-size:1rem; cursor: pointer;
            text-decoration: none; transition: var(--transition); border: none; font-family: inherit;
        }
        .btn-primary { background: var(--primary); color:#fff; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-3px); }
        .btn-outline { background: var(--white); color:var(--primary); border:2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary-light); }
        .section { padding:80px 20px; max-width: var(--max-width); margin:0 auto; }
        .section-header { text-align: center; margin-bottom:50px; }
        .section-header .section-tag {
            display: inline-block; background: var(--primary-light); color:var(--primary);
            padding:6px 16px; border-radius:50px; font-weight:600; font-size:0.85rem;
            letter-spacing:2px; margin-bottom:14px;
        }
        .section-header h2 { font-size: 2rem; color:#2A1F18; margin-bottom:8px; }
        .section-header p { color:var(--text-light); font-size:1rem; }
        .register-section {
            background: var(--bg-gray); border-radius: var(--radius-lg); padding:50px 40px;
            max-width:800px; margin:0 auto; box-shadow: var(--shadow);
        }
        .form-group { margin-bottom:22px; }
        .form-group label { display: block; font-weight:600; margin-bottom:6px; color:#2A1F18; }
        .form-group input, .form-group textarea {
            width:100%; padding:12px 16px; border:2px solid var(--border); border-radius: var(--radius-sm);
            font-size:0.95rem; font-family:inherit; background: var(--white); outline: none;
        }
        .form-group textarea { min-height:100px; }
        .footer { background:#2A1F18; color:#ccc; text-align:center; padding:40px 20px; margin-top:60px; }
        @media(max-width:768px){ .section { padding:50px 16px; } .register-section { padding:30px 20px; } }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="#" class="nav-logo"><span class="logo-icon">🪲</span>萤火支教</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="#home">🏠 首页</a></li>
                <li><a href="#messages">💬 留言板</a></li>
                <li><a href="#register">✍️ 报名</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero" id="home">
        <div class="hero-content">
            <div class="hero-text">
                <h1>用一段<span>支教时光</span><br>点亮乡村孩子的未来</h1>
                <p>萤火支教团队已走过8个省份、服务超过50所乡村学校。我们相信，每个大学生都是一束光，汇聚便能照亮远方。</p>
                <div class="hero-buttons">
                    <a href="#messages" class="btn btn-primary">💬 进入留言板</a>
                    <a href="#register" class="btn btn-outline">✍️ 立即报名</a>
                </div>
            </div>
        </div>
    </section>

    <!-- 留言板区域 -->
    <section class="section" id="messages">
        <div class="section-header">
            <span class="section-tag">MESSAGES</span>
            <h2>爱心留言板</h2>
            <p>把想说的话写在这里，大朋友会来回复哦~</p>
        </div>
        <div class="register-section">
            <div class="form-group">
                <label>你的昵称</label>
                <input type="text" id="msgNick" placeholder="给自己起个名字吧">
            </div>
            <div class="form-group">
                <label>你的留言</label>
                <textarea id="msgContent" placeholder="想说什么呢？" rows="3"></textarea>
            </div>
            <button class="btn btn-primary" onclick="submitMessage()" style="width:100%;">💬 发布留言</button>
            <div id="messageList" style="margin-top:30px;"></div>
        </div>
    </section>

    <!-- 报名区域（占位，保留原有功能） -->
    <section class="section" id="register">
        <div class="section-header"><span class="section-tag">APPLY</span><h2>志愿者报名</h2><p>填写表单，加入萤火支教团队</p></div>
        <div class="register-section">
            <form id="registerForm">
                <div class="form-group"><label>姓名</label><input type="text" id="name" required></div>
                <div class="form-group"><label>学校</label><input type="text" id="university" required></div>
                <div class="form-group"><label>手机号</label><input type="tel" id="phone" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%;">提交报名</button>
            </form>
        </div>
    </section>

    <footer class="footer"><p>🪲 萤火支教 · 点亮希望</p></footer>

    <script>
        // ========== CloudBase 初始化 ==========
        const app = cloudbase.init({
            env: 'zhijiao-d6guww7bv19d5c6bc'   // ⬅️ 你的环境 ID 在这里！
        });
        const db = app.database();

        // ========== 留言板功能 ==========
        async function submitMessage() {
            const nick = document.getElementById('msgNick').value.trim();
            const content = document.getElementById('msgContent').value.trim();
            if (!nick || !content) {
                alert('昵称和留言不能为空');
                return;
            }
            try {
                await db.collection('messages').add({
                    nick,
                    content,
                    reply: '',
                    createdAt: new Date()
                });
                document.getElementById('msgNick').value = '';
                document.getElementById('msgContent').value = '';
                loadMessages();
            } catch (e) {
                alert('发布失败，请稍后重试');
                console.error(e);
            }
        }
        window.submitMessage = submitMessage;

        async function loadMessages() {
            const container = document.getElementById('messageList');
            if (!container) return;
            try {
                const res = await db.collection('messages')
                                      .orderBy('createdAt', 'desc')
                                      .get();
                const data = res.data;
                if (data.length === 0) {
                    container.innerHTML = '<p style="text-align:center;color:gray;">还没有留言，快来写第一条吧~</p>';
                    return;
                }
                container.innerHTML = data.map(msg => `
                    <div style="background:#fff;padding:16px;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05);">
                        <div style="font-weight:600;color:var(--primary);margin-bottom:6px;">
                            ${escapeHTML(msg.nick)}
                            <span style="font-size:0.8rem;color:var(--text-lighter);margin-left:8px;">
                                ${msg.createdAt ? new Date(msg.createdAt).toLocaleString() : ''}
                            </span>
                        </div>
                        <div style="margin-bottom:10px;">${escapeHTML(msg.content)}</div>
                        ${msg.reply ? `
                            <div style="background:var(--primary-light);padding:10px;border-radius:8px;color:var(--secondary);font-size:0.9rem;">
                                <strong>大朋友回复：</strong>${escapeHTML(msg.reply)}
                            </div>
                        ` : ''}
                        <button class="btn btn-sm btn-outline" onclick="replyToMessage('${msg._id}', '${escapeHTML(msg.nick)}')" style="margin-top:8px;">回复</button>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载留言失败', e);
                container.innerHTML = '<p style="color:red;">留言加载失败，请刷新页面重试。</p>';
            }
        }
        window.loadMessages = loadMessages;

        async function replyToMessage(id, nick) {
            const replyText = prompt(`回复给 ${nick}：`);
            if (!replyText) return;
            try {
                await db.collection('messages').doc(id).update({ reply: replyText });
                loadMessages();
            } catch (e) {
                alert('回复失败，请重试');
                console.error(e);
            }
        }
        window.replyToMessage = replyToMessage;

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 页面加载时自动显示留言
        document.addEventListener('DOMContentLoaded', loadMessages);

        // ========== 报名表提交（也存到 CloudBase） ==========
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const university = document.getElementById('university').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if (!name || !university || !phone) {
                alert('请完整填写信息');
                return;
            }
            try {
                await db.collection('applications').add({
                    name,
                    university,
                    phone,
                    createdAt: new Date()
                });
                alert('报名成功！');
                this.reset();
            } catch (e) {
                alert('报名失败，请重试');
                console.error(e);
            }
        });
    </script>
</body>
</html>
