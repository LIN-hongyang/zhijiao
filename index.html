<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萤火支教 - 点亮希望·筑梦前行</title>

    <!-- 腾讯云官方稳定SDK -->
    <script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.8/tcb.js"></script>

    <style>
        :root {
            --primary: #F4845F;
            --primary-dark: #E0693F;
            --primary-light: #FFF0EA;
            --secondary: #3D5A80;
            --accent: #EEB868;
            --success: #5CB85C;
            --info: #5BC0DE;
            --warning: #F0AD4E;
            --danger: #D9534F;
            --bg: #FFFDF9;
            --bg-gray: #F8F6F1;
            --text: #3D3D3D;
            --text-light: #6B6B6B;
            --text-lighter: #999;
            --white: #FFFFFF;
            --border: #E8E3DA;
            --shadow-sm: 0 2px 8px rgba(61,45,30,0.06);
            --shadow: 0 4px 20px rgba(61,45,30,0.10);
            --shadow-lg: 0 8px 40px rgba(61,45,30,0.14);
            --radius: 14px;
            --radius-sm: 8px;
            --radius-lg: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            --max-width: 1200px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; font-size:16px; }
        body {
            font-family: var(--font-family);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .navbar {
            position: fixed; top:0; left:0; right:0; z-index:1000;
            background: rgba(255,253,249,0.88);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); transition: var(--transition); padding: 0 20px;
        }
        .navbar.scrolled { box-shadow: var(--shadow-sm); background: rgba(255,253,249,0.96); }
        .navbar-inner {
            max-width: var(--max-width); margin:0 auto;
            display: flex; align-items: center; justify-content: space-between; height:66px;
        }
        .nav-logo {
            display: flex; align-items: center; gap:10px; text-decoration: none;
            font-size:1.4rem; font-weight:700; color:var(--primary); letter-spacing:1px; transition: var(--transition);
        }
        .nav-logo .logo-icon {
            width:40px; height:40px; background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size:1.4rem; color:#fff; box-shadow: 0 4px 14px rgba(244,132,95,0.35);
        }
        .nav-links { display: flex; list-style: none; gap:6px; align-items: center; }
        .nav-links a {
            text-decoration: none; color:var(--text); padding:10px 18px; border-radius:50px;
            font-weight:500; font-size:0.95rem; transition: var(--transition); letter-spacing:0.5px;
        }
        .nav-links a:hover, .nav-links a.active { color:var(--primary); background: var(--primary-light); }
        .nav-links a.btn-nav {
            background: var(--primary); color:#fff; padding:10px 22px; font-weight:600;
            box-shadow: 0 4px 14px rgba(244,132,95,0.35); transition: var(--transition);
        }
        .nav-links a.btn-nav:hover {
            background: var(--primary-dark); transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244,132,95,0.45); color:#fff;
        }
        .hero {
            min-height:100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(170deg, #FFFDF9 0%, #FFF5EF 30%, #FFEDE2 60%, #FFFDF9 100%);
            position: relative; overflow: hidden; padding:100px 20px 60px;
        }
        .hero-content {
            position: relative; z-index:2; max-width:var(--max-width); width:100%;
            display: flex; align-items: center; gap:50px; flex-wrap: wrap;
        }
        .hero-text { flex:1 1 420px; text-align:center; }
        .hero-text h1 {
            font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight:800; line-height:1.25;
            color:#2A1F18; margin-bottom:16px;
        }
        .hero-text h1 span { color:var(--primary); }
        .hero-text p {
            font-size:1.15rem; color:var(--text-light); margin-bottom:30px; max-width:480px; margin-left:auto; margin-right:auto;
        }
        .hero-buttons { display: flex; gap:14px; flex-wrap: wrap; justify-content:center; }
        .btn {
            display: inline-flex; align-items: center; gap:8px; padding:13px 28px;
            border-radius:50px; font-weight:600; font-size:1rem; cursor: pointer;
            text-decoration: none; transition: var(--transition); border: none; font-family: inherit;
        }
        .btn-primary { background: var(--primary); color:#fff; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-3px); }
        .btn-outline { background: var(--white); color:var(--primary); border:2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary-light); }
        .section { padding:80px 20px; max-width: var(--max-width); margin:0 auto; }
        .section-header { text-align: center; margin-bottom:50px; }
        .section-header .section-tag {
            display: inline-block; background: var(--primary-light); color:var(--primary);
            padding:6px 16px; border-radius:50px; font-weight:600; font-size:0.85rem;
            letter-spacing:2px; margin-bottom:14px;
        }
        .section-header h2 { font-size: 2rem; color:#2A1F18; margin-bottom:8px; }
        .section-header p { color:var(--text-light); font-size:1rem; }
        .register-section {
            background: var(--bg-gray); border-radius: var(--radius-lg); padding:50px 40px;
            max-width:800px; margin:0 auto; box-shadow: var(--shadow);
        }
        .form-group { margin-bottom:22px; }
        .form-group label { display: block; font-weight:600; margin-bottom:6px; color:#2A1F18; }
        .form-group input, .form-group textarea {
            width:100%; padding:12px 16px; border:2px solid var(--border); border-radius: var(--radius-sm);
            font-size:0.95rem; font-family:inherit; background: var(--white); outline: none;
        }
        .form-group textarea { min-height:100px; }
        .footer { background:#2A1F18; color:#ccc; text-align:center; padding:40px 20px; margin-top:60px; }
        @media(max-width:768px){ .section { padding:50px 16px; } .register-section { padding:30px 20px; } }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="#" class="nav-logo"><span class="logo-icon">🪲</span>萤火支教</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="#home" class="active">首页</a></li>
                <li><a href="#messages">留言板</a></li>
                <li><a href="#register" class="btn-nav">报名</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero" id="home">
        <div class="hero-content">
            <div class="hero-text">
                <h1>萤火支教 · <span>点亮希望</span></h1>
                <p>用微光汇聚星河，用陪伴温暖时光。我们用知识的火种，照亮乡村孩子的梦想。</p>
                <div class="hero-buttons">
                    <a href="#register" class="btn btn-primary">立即报名</a>
                    <a href="#messages" class="btn btn-outline">查看留言</a>
                </div>
            </div>
        </div>
    </section>

    <section class="section" id="messages">
        <div class="section-header">
            <span class="section-tag">MESSAGES</span>
            <h2>爱心留言板</h2>
            <p>把想说的话写在这里，大朋友会来回复哦~</p>
        </div>
        <div class="register-section">
            <div class="form-group">
                <label>你的昵称</label>
                <input type="text" id="nickname" placeholder="请输入你的昵称">
            </div>
            <div class="form-group">
                <label>你的留言</label>
                <textarea id="message" placeholder="写下你想说的话..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="submitMessage()">提交留言</button>
        </div>
    </section>

    <section class="section" id="register">
        <div class="section-header">
            <span class="section-tag">JOIN US</span>
            <h2>志愿者报名</h2>
            <p>和我们一起，成为照亮乡村的那束光</p>
        </div>
        <div class="register-section">
            <div class="form-group">
                <label>你的姓名</label>
                <input type="text" placeholder="请输入姓名">
            </div>
            <div class="form-group">
                <label>联系方式</label>
                <input type="text" placeholder="请输入手机号">
            </div>
            <div class="form-group">
                <label>留言（选填）</label>
                <textarea placeholder="写下你想说的话..."></textarea>
            </div>
            <button class="btn btn-primary">提交报名</button>
        </div>
    </section>

    <footer class="footer">
        <p>© 2026 萤火支教 · 点亮希望·筑梦前行</p>
    </footer>

    <!-- 云开发初始化+留言提交（已配置好你的环境ID和集合名） -->
    <script>
        const app = tcb.init({
            env: "zhijiao-d6guww7bv19d5c6bc"
        });
        const db = app.database();

        async function submitMessage() {
            const name = document.getElementById('nickname').value.trim();
            const content = document.getElementById('message').value.trim();

            if (!name || !content) {
                alert('昵称和留言都不能为空哦~');
                return;
            }

            try {
                await db.collection('message').add({
                    data: {
                        name: name,
                        content: content,
                        createTime: new Date()
                    }
                });
                alert('留言发布成功！');
                location.reload();
            } catch (err) {
                console.error('发布失败:', err);
                alert('发布失败: ' + err.message);
            }
        }
    </script>
</body>
</html>
